services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: easyoffer
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d easyoffer"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-db-init:
    image: postgres:15
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=password
    command:
      - /bin/sh
      - -ec
      - |
        psql -h postgres -U user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='easyoffer_auth'" | grep -q 1 || psql -h postgres -U user -d postgres -c "CREATE DATABASE easyoffer_auth"
        psql -h postgres -U user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='easyoffer_question'" | grep -q 1 || psql -h postgres -U user -d postgres -c "CREATE DATABASE easyoffer_question"
    restart: "no"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kafka:
   image: confluentinc/cp-kafka:7.4.0
   depends_on:
     - zookeeper
   ports:
     - "9092:9092"
   environment:
     KAFKA_BROKER_ID: 1
     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
     KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
     KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  zookeeper:
   image: confluentinc/cp-zookeeper:7.4.0
   environment:
     ZOOKEEPER_CLIENT_PORT: 2181
     ZOOKEEPER_TICK_TIME: 2000

  auth-service:
    build: ../services/auth
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=easyoffer_auth
      - JWT_SECRET=your-secret-key
    depends_on:
      postgres:
        condition: service_healthy
      auth-migrations:
        condition: service_completed_successfully

  auth-migrations:
    image: migrate/migrate:v4.18.3
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://user:password@postgres:5432/easyoffer_auth?sslmode=disable&x-migrations-table=schema_migrations_auth"
      - "up"
    volumes:
      - ../services/auth/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
    restart: "no"

  question-service:
    build: ../services/question
    ports:
      - "8082:8082"
    environment:
      - QUESTION_SERVICE_PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=easyoffer_question
      - KAFKA_ENABLED=true
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC_QUESTIONS=questions.events
    depends_on:
      postgres:
        condition: service_healthy
      question-migrations:
        condition: service_completed_successfully

  question-migrations:
    image: migrate/migrate:v4.18.3
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://user:password@postgres:5432/easyoffer_question?sslmode=disable&x-migrations-table=schema_migrations_question"
      - "up"
    volumes:
      - ../services/question/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
    restart: "no"

  interview-service:
    build: ../services/interview
    ports:
      - "8083:8083"
    environment:
      - INTERVIEW_SERVICE_PORT=8083
      - QUESTION_SERVICE_URL=http://question-service:8082
      - REDIS_ADDR=redis:6379
      - REDIS_DB=0
      - KAFKA_ENABLED=true
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC_QUESTIONS=questions.events
      - KAFKA_CONSUMER_GROUP=interview-service
    depends_on:
      question-service:
        condition: service_started
      redis:
        condition: service_healthy

  gateway-swagger:
    image: golang:latest
    working_dir: /app
    volumes:
      - ../services/gateway:/app
    command:
      - /bin/sh
      - -c
      - rm -rf docs && go run github.com/swaggo/swag/cmd/swag@v1.16.6 init -g cmd/main.go -o docs --parseInternal
    profiles:
      - tools

  gateway:
    build: ../services/gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - QUESTION_SERVICE_URL=http://question-service:8082
      - INTERVIEW_SERVICE_URL=http://interview-service:8083
      - JWT_SECRET=your-secret-key
    depends_on:
      - auth-service
      - question-service
      - interview-service

  prometheus:
   image: prom/prometheus
   ports:
     - "9090:9090"
   volumes:
     - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
   command:
     - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
   image: grafana/grafana
   ports:
     - "3000:3000"
   environment:
     - GF_SECURITY_ADMIN_PASSWORD=admin
   volumes:
     - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  grafana_data: